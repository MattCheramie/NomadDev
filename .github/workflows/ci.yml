name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: go vet ./...
      # -coverpkg=./... measures coverage across every package the
      # default suite touches, not just the package under test. The
      # threshold is intentionally low so the bar tightens as we add
      # tests rather than gates new code on a number we haven't yet
      # justified.
      - name: test (with coverage)
        run: |
          go test -race -count=1 -coverpkg=./... -coverprofile=coverage.out ./...
      - name: coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          echo "TOTAL_COVERAGE=${total}" >> "$GITHUB_ENV"
      - name: enforce coverage floor
        env:
          # Measured 64.0% at Phase 9.2 introduction; floor set well
          # below the current level so legitimate refactors don't
          # bounce the build. Tighten as the suite grows.
          MIN_COVERAGE: '55'
        run: |
          awk -v have="${TOTAL_COVERAGE}" -v want="${MIN_COVERAGE}" 'BEGIN {
            if (have+0 < want+0) {
              printf "coverage %.1f%% is below floor %.1f%%\n", have, want
              exit 1
            }
            printf "coverage %.1f%% >= floor %.1f%%\n", have, want
          }'
      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage.out
            coverage-summary.txt
          retention-days: 14

  test-docker:
    name: test (docker tag)
    runs-on: ubuntu-latest
    # The ubuntu-latest runner has Docker pre-installed. We exercise the live
    # daemon to cover the round-trip paths in internal/sandbox/docker.go that
    # the default suite can only fake with the MockRunner.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - run: docker pull alpine:3.20
      - run: go vet -tags docker ./...
      - run: go test -tags docker -race -count=1 -timeout 180s ./internal/sandbox/...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  build-tags:
    name: build (tagged)
    # Confirms that the docker, gemini, and github build tags compile without
    # actually exercising the SDKs; catches upstream API breakage early.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build -tags docker ./...
      - run: go build -tags gemini ./...
      - run: go build -tags github ./...
      - run: go build -tags "docker gemini github" ./...

  test-github:
    name: test (github tag)
    # Exercises the subprocess+stdio path of internal/githubmcp without
    # needing the real github-mcp-server binary — the unit tests cover
    # arg/env construction, schema conversion, and destructive-tool routing.
    # A live smoke (`-tags github_live`) needs a PAT and is opt-in.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -tags github -race -count=1 ./internal/githubmcp/...

  mobile:
    name: mobile (SPA)
    # Builds the Expo web bundle and runs the Jest suite. Exercises the
    # wire-types port, the Zustand store reducers, and the WS client
    # against a mock-socket server.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:web

  docker-image:
    name: docker image (dry-run)
    # Builds the production Dockerfile on every PR so breakage in the
    # multi-stage build is caught before a release tag is pushed. No push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: nomaddev/orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Phase 8.4: fail the build on HIGH/CRITICAL CVEs in the image
      # we're about to ship. Trivy reads the image we just loaded into
      # the local Docker daemon; no push or registry access required.
      #
      # Pinned by commit SHA (not tag) because aquasecurity/trivy-action
      # was the target of a tag-hijack supply-chain attack in March 2026
      # affecting many pre-v0.35.0 tags. SHA pinning is GitHub's
      # recommended discipline for any third-party action; this one
      # earns it twice. SHA = v0.36.0.
      - name: vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: nomaddev/orchestrator:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
          vuln-type: 'os,library'

  mobile-e2e:
    name: mobile (E2E)
    # End-to-end smoke against a real orchestrator. Builds the SPA +
    # orchestrator binary, starts it with the mock translator and
    # auto-grant approvals, mints a JWT, and drives Playwright through
    # the onboarding-to-first-turn path. The same code path operators
    # hit on a phone — fragment-based deep link, fragment-stripped on
    # first paint, WS handshake, mock assistant reply.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: install mobile deps
        working-directory: mobile
        run: npm ci
      - name: install playwright (chromium)
        working-directory: mobile
        run: npx playwright install --with-deps chromium
      - name: build SPA + orchestrator
        # build-full chains build-mobile (expo export → dist/) and
        # build (go build with the embedded SPA). The resulting
        # orchestrator binary serves the SPA at / on whatever it
        # binds to.
        run: make build-full
      - name: start orchestrator (mock translator + auto-grant)
        env:
          NOMADDEV_JWT_SECRET: e2e-test-secret-that-is-definitely-long-enough-32-bytes
          NOMADDEV_MIDDLEWARE_RUNTIME: mock
          NOMADDEV_APPROVAL_AUTO_GRANT: 'true'
          NOMADDEV_HISTORY_BACKEND: memory
          NOMADDEV_SESSION_BACKEND: memory
          NOMADDEV_SANDBOX_RUNTIME: mock
          NOMADDEV_AUTH_REVOCATION_BACKEND: memory
          NOMADDEV_AUDIT_BACKEND: stderr
          # The default workspace path /var/lib/nomaddev/work isn't
          # writable on a stock GitHub-hosted runner; the middleware
          # builder MkdirAll's it and fails silently in the background
          # process if we don't override. RUNNER_TEMP is always
          # writable and ephemeral.
          NOMADDEV_SANDBOX_WORKSPACE_DIR: ${{ runner.temp }}/nomaddev-work
        run: |
          ./bin/orchestrator -listen 127.0.0.1:8080 > orchestrator.log 2>&1 &
          echo $! > orchestrator.pid
          # Wait for /healthz to come up — gives the binary a fair
          # window to bind before Playwright starts hitting it.
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null http://127.0.0.1:8080/healthz; then
              echo "orchestrator is up"
              break
            fi
            sleep 0.5
          done
          # If /healthz still isn't responding, dump the orchestrator
          # log so the failure mode is visible — silent-background-exit
          # is what we hit on the first CI run.
          if ! curl -fsS http://127.0.0.1:8080/healthz; then
            echo "::error::orchestrator failed to bind; recent log:"
            tail -50 orchestrator.log || true
            exit 1
          fi
      - name: mint JWT for the test
        id: jwt
        env:
          NOMADDEV_JWT_SECRET: e2e-test-secret-that-is-definitely-long-enough-32-bytes
        run: |
          token=$(go run ./scripts/gen-jwt -sub e2e -sid sess-e2e -ttl 5m)
          # Mask the token so it doesn't appear in workflow logs.
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - name: run Playwright
        working-directory: mobile
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
          E2E_TOKEN: ${{ steps.jwt.outputs.token }}
          E2E_SID: sess-e2e
        run: npm run e2e
      - name: stop orchestrator
        if: always()
        run: |
          if [ -f orchestrator.pid ]; then
            kill "$(cat orchestrator.pid)" 2>/dev/null || true
          fi
      - name: upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            mobile/playwright-report/
            mobile/test-results/
          retention-days: 7

  reproducible-build-report:
    name: reproducible build (report-only)
    # Phase 12.1: report-only diffoscope investigation, deferred from
    # PR #32 where the build-twice-and-compare check failed in CI but
    # passed locally. This job builds the orchestrator twice with the
    # release-workflow flags, runs diffoscope against the two
    # binaries when they differ, and uploads the report as an
    # artifact. Non-blocking: the job ALWAYS exits 0 so a real
    # reproducibility regression doesn't bounce unrelated PRs. The
    # investigator's job is to download the report and figure out
    # which section diverged.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: install diffoscope
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq diffoscope
      - name: build twice
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
          SOURCE_DATE_EPOCH: '1700000000'
        run: |
          mkdir -p out1 out2
          go clean -cache
          go build -trimpath -tags "gemini github" \
            -ldflags "-s -w -buildid= -X main.version=ci-reproducible" \
            -o out1/orchestrator ./cmd/orchestrator
          go clean -cache
          go build -trimpath -tags "gemini github" \
            -ldflags "-s -w -buildid= -X main.version=ci-reproducible" \
            -o out2/orchestrator ./cmd/orchestrator
      - name: compare + diffoscope report
        run: |
          h1=$(sha256sum out1/orchestrator | awk '{print $1}')
          h2=$(sha256sum out2/orchestrator | awk '{print $1}')
          echo "build 1: $h1"
          echo "build 2: $h2"
          if [ "$h1" = "$h2" ]; then
            echo "reproducible ✓"
            echo "RESULT=match" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "RESULT=mismatch" >> "$GITHUB_ENV"
          # Capped at 5min so an enormous diff doesn't hang the job.
          # Output both --text (greppable) and --html (clickable) so
          # the operator can pick.
          timeout 300 diffoscope --text diff.txt --html diff.html \
            out1/orchestrator out2/orchestrator || true
          # Always succeed — this is a report job.
          true
      - name: upload diff (on mismatch)
        if: env.RESULT == 'mismatch'
        uses: actions/upload-artifact@v4
        with:
          name: reproducible-build-diff
          path: |
            diff.txt
            diff.html
          retention-days: 14
          if-no-files-found: warn

  mobile-native-android:
    name: native mobile (android build)
    # Phase M1 of the native Go mobile app rollout. Cross-compiles
    # cmd/nomaddev-mobile (Gio) into an unsigned debug APK so any
    # breakage in the Go source, gogio version, or SDK/NDK pin is
    # caught on every PR. No signing, no release — sideload happens
    # by hand off the GitHub Release in M6.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
      - name: install gogio
        run: make android-tools
      - name: build debug APK
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: make android-debug
      - name: upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomaddev-android-debug
          path: build/android/nomaddev.apk
          retention-days: 14
          if-no-files-found: error

  govulncheck:
    name: govulncheck
    # Catches known Go-module vulnerabilities (golang.org/x/vuln) before
    # they reach a release. Fails the run if any reachable vuln is found.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
