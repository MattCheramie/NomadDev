name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual path: cut a release from the Actions tab without pushing a tag
  # locally. Supply the version (e.g. v0.1.0) and the `github release` job
  # creates the tag at the dispatched commit. Tags created with the default
  # GITHUB_TOKEN do not re-fire the `push: tags` trigger, so a dispatch run
  # never doubles up with a tag-push run.
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.1.0'
        required: true
        type: string

permissions:
  contents: write     # gh release create
  packages: write     # GHCR push
  id-token: write     # cosign keyless OIDC signing
  attestations: write # cosign attest

jobs:
  # Single source of truth for the release version: the pushed tag name on
  # a tag trigger, or the validated dispatch input on a manual run.
  version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: resolve version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "::error::version must look like vMAJOR.MINOR.PATCH (e.g. v0.1.0); got '$VERSION'"
              exit 1
            fi
          else
            VERSION="$REF_NAME"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  binaries:
    name: binaries (linux/${{ matrix.arch }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build the SPA once per arch — the bundle is identical, but it
      # has to live at internal/wsserver/dist before `go build` runs so
      # the embed.FS picks up the real assets.
      - name: build SPA
        run: make build-mobile

      - name: build orchestrator
        # Ship the full feature set in tagged releases: -tags gemini activates
        # the Google GenAI translator (runtime=gemini), -tags github activates
        # the GitHub MCP backend. Default runtime=mock + token-empty still
        # works for ops who don't configure either, so this widens the
        # released binary without changing the no-config default.
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p dist
          go build -trimpath -tags "gemini github" \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/orchestrator-linux-${{ matrix.arch }}" \
            ./cmd/orchestrator
          sha256sum "dist/orchestrator-linux-${{ matrix.arch }}" \
            > "dist/orchestrator-linux-${{ matrix.arch }}.sha256"

      # Phase 8.4: supply-chain hygiene for the binary release. Generate
      # an SPDX SBOM and a keyless cosign signature alongside the bare
      # binary. Verification command lives in docs/supply-chain.md.
      - name: generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: ./dist/orchestrator-linux-${{ matrix.arch }}
          format: spdx-json
          output-file: dist/orchestrator-linux-${{ matrix.arch }}.spdx.json
          upload-artifact: false

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign binary (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign-blob --yes \
            --output-signature "dist/orchestrator-linux-${{ matrix.arch }}.sig" \
            --output-certificate "dist/orchestrator-linux-${{ matrix.arch }}.pem" \
            "dist/orchestrator-linux-${{ matrix.arch }}"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-linux-${{ matrix.arch }}
          path: dist/orchestrator-linux-${{ matrix.arch }}*
          if-no-files-found: error
          retention-days: 7

  android-apk:
    name: signed android apk
    # Builds the native Go mobile app into a signed APK on every tagged
    # release and uploads it as an artifact the release job attaches to
    # the GitHub Release. Operators sideload by downloading the APK from
    # the release page.
    #
    # Signing inputs (repository secrets):
    #   ANDROID_KEYSTORE_BASE64 — JKS/PKCS12 keystore, base64-encoded
    #   ANDROID_KEYSTORE_PASS   — keystore password
    #
    # When either secret is unset the job skips the signing step but
    # still uploads the unsigned APK so the release records the build.
    # The release job then attaches whichever artifact was produced.
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'
      - name: install gogio
        run: make android-tools
      - name: derive version for gogio
        # gogio's -version flag is major.minor.patch.versioncode. We take
        # the release version (e.g. v0.1.0) and append the commit count
        # ahead of the parent tag for the integer versioncode — that
        # gives a monotonically increasing value across releases.
        id: gogio_version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          semver="${VERSION#v}"
          code=$(git rev-list --count HEAD)
          echo "version=${semver}.${code}" >> "$GITHUB_OUTPUT"
      - name: decode keystore (if provided)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "no ANDROID_KEYSTORE_BASE64 secret set; producing an unsigned APK"
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p build/android
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > build/android/release.keystore
          echo "have_keystore=true" >> "$GITHUB_OUTPUT"
      - name: build signed APK
        if: steps.keystore.outputs.have_keystore == 'true'
        env:
          ANDROID_KEYSTORE: ${{ github.workspace }}/build/android/release.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          ANDROID_VERSION: ${{ steps.gogio_version.outputs.version }}
        run: make android-release
      - name: build unsigned APK
        if: steps.keystore.outputs.have_keystore != 'true'
        env:
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: make android-debug
      - name: stage APK for upload
        run: |
          mkdir -p dist
          if [ -f build/android/nomaddev-release.apk ]; then
            cp build/android/nomaddev-release.apk dist/nomaddev.apk
          else
            cp build/android/nomaddev.apk dist/nomaddev.apk
          fi
      - name: upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nomaddev-android
          path: dist/nomaddev.apk
          retention-days: 14

  release:
    name: github release
    needs: [version, binaries, android-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create release
        # On a manual dispatch the tag does not exist yet — gh creates it
        # at the dispatched commit (--target). On a tag push the tag is
        # already present and --target is ignored.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --generate-notes \
            dist/orchestrator-linux-amd64 \
            dist/orchestrator-linux-amd64.sha256 \
            dist/orchestrator-linux-amd64.spdx.json \
            dist/orchestrator-linux-amd64.sig \
            dist/orchestrator-linux-amd64.pem \
            dist/orchestrator-linux-arm64 \
            dist/orchestrator-linux-arm64.sha256 \
            dist/orchestrator-linux-arm64.spdx.json \
            dist/orchestrator-linux-arm64.sig \
            dist/orchestrator-linux-arm64.pem \
            dist/nomaddev.apk

  image:
    name: ghcr image (multi-arch)
    needs: version
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: tags
        id: tags
        env:
          REF: ${{ needs.version.outputs.version }}
        run: |
          echo "tags=ghcr.io/${{ github.repository }}:${REF},ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"

      - name: build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Phase 8.4: sign + SBOM-attest the pushed manifest by digest.
      # Operators verify with `cosign verify ghcr.io/...@sha256:... \
      #   --certificate-identity-regexp '...' \
      #   --certificate-oidc-issuer https://token.actions.githubusercontent.com`.
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: image.spdx.json
          upload-artifact: false

      - name: sign image (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"

      - name: attest SBOM
        env:
          COSIGN_YES: 'true'
        run: |
          cosign attest --yes \
            --predicate image.spdx.json \
            --type spdxjson \
            "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
