name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write     # gh release create
  packages: write     # GHCR push
  id-token: write     # cosign keyless OIDC signing
  attestations: write # cosign attest

jobs:
  binaries:
    name: binaries (linux/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build the SPA once per arch — the bundle is identical, but it
      # has to live at internal/wsserver/dist before `go build` runs so
      # the embed.FS picks up the real assets.
      - name: build SPA
        run: make build-mobile

      - name: build orchestrator
        # Ship the full feature set in tagged releases: -tags gemini activates
        # the Google GenAI translator (runtime=gemini), -tags github activates
        # the GitHub MCP backend. Default runtime=mock + token-empty still
        # works for ops who don't configure either, so this widens the
        # released binary without changing the no-config default.
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath -tags "gemini github" \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/orchestrator-linux-${{ matrix.arch }}" \
            ./cmd/orchestrator
          sha256sum "dist/orchestrator-linux-${{ matrix.arch }}" \
            > "dist/orchestrator-linux-${{ matrix.arch }}.sha256"

      # Phase 8.4: supply-chain hygiene for the binary release. Generate
      # an SPDX SBOM and a keyless cosign signature alongside the bare
      # binary. Verification command lives in docs/supply-chain.md.
      - name: generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: ./dist/orchestrator-linux-${{ matrix.arch }}
          format: spdx-json
          output-file: dist/orchestrator-linux-${{ matrix.arch }}.spdx.json
          upload-artifact: false

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign binary (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign-blob --yes \
            --output-signature "dist/orchestrator-linux-${{ matrix.arch }}.sig" \
            --output-certificate "dist/orchestrator-linux-${{ matrix.arch }}.pem" \
            "dist/orchestrator-linux-${{ matrix.arch }}"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-linux-${{ matrix.arch }}
          path: dist/orchestrator-linux-${{ matrix.arch }}*
          if-no-files-found: error
          retention-days: 7

  release:
    name: github release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/orchestrator-linux-amd64 \
            dist/orchestrator-linux-amd64.sha256 \
            dist/orchestrator-linux-amd64.spdx.json \
            dist/orchestrator-linux-amd64.sig \
            dist/orchestrator-linux-amd64.pem \
            dist/orchestrator-linux-arm64 \
            dist/orchestrator-linux-arm64.sha256 \
            dist/orchestrator-linux-arm64.spdx.json \
            dist/orchestrator-linux-arm64.sig \
            dist/orchestrator-linux-arm64.pem

  image:
    name: ghcr image (multi-arch)
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: image ref + tags
        id: tags
        env:
          REF: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # GHCR (OCI) repository names must be lowercase, but
          # github.repository keeps the repo's original casing
          # (MattCheramie/NomadDev). Lowercase it before use as an image
          # reference or docker/buildx and cosign reject the tag.
          IMAGE="ghcr.io/$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${REF},${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Phase 8.4: sign + SBOM-attest the pushed manifest by digest.
      # Operators verify with `cosign verify ghcr.io/...@sha256:... \
      #   --certificate-identity-regexp '...' \
      #   --certificate-oidc-issuer https://token.actions.githubusercontent.com`.
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: image.spdx.json
          upload-artifact: false

      - name: sign image (keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          cosign sign --yes \
            "${{ steps.tags.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: attest SBOM
        env:
          COSIGN_YES: 'true'
        run: |
          cosign attest --yes \
            --predicate image.spdx.json \
            --type spdxjson \
            "${{ steps.tags.outputs.image }}@${{ steps.build.outputs.digest }}"
