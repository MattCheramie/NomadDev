name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # gh release create
  packages: write   # GHCR push

jobs:
  binaries:
    name: binaries (linux/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Build the SPA once per arch — the bundle is identical, but it
      # has to live at internal/wsserver/dist before `go build` runs so
      # the embed.FS picks up the real assets.
      - name: build SPA
        run: make build-mobile

      - name: build orchestrator
        # Ship the full feature set in tagged releases: -tags gemini activates
        # the Google GenAI translator (runtime=gemini), -tags github activates
        # the GitHub MCP backend. Default runtime=mock + token-empty still
        # works for ops who don't configure either, so this widens the
        # released binary without changing the no-config default.
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          go build -trimpath -tags "gemini github" \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/orchestrator-linux-${{ matrix.arch }}" \
            ./cmd/orchestrator
          sha256sum "dist/orchestrator-linux-${{ matrix.arch }}" \
            > "dist/orchestrator-linux-${{ matrix.arch }}.sha256"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-linux-${{ matrix.arch }}
          path: dist/orchestrator-linux-${{ matrix.arch }}*
          if-no-files-found: error
          retention-days: 7

  release:
    name: github release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/orchestrator-linux-amd64 \
            dist/orchestrator-linux-amd64.sha256 \
            dist/orchestrator-linux-arm64 \
            dist/orchestrator-linux-arm64.sha256

  image:
    name: ghcr image (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: tags
        id: tags
        env:
          REF: ${{ github.ref_name }}
        run: |
          echo "tags=ghcr.io/${{ github.repository }}:${REF},ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
