name: GitHub MCP upstream drift

# Catches breaking changes in the upstream github-mcp-server before they
# ship in a release-day Dockerfile bump. The adapter assumes:
#   - tools/list returns a non-empty Tool slice
#   - each Tool.InputSchema marshals to JSON our ConvertSchema accepts
#   - destructive tools have either DestructiveHint or a verb-prefixed name
#
# When the upstream changes any of these, this workflow fails and surfaces
# the diagnostic in the run log so we can pin a known-good version (or
# update the adapter) before the next release.

on:
  # Weekly: Mondays 06:00 UTC.
  schedule:
    - cron: '0 6 * * 1'
  # On-demand: manually re-run from the Actions tab.
  workflow_dispatch:
  # On PRs that touch the adapter or its build args, run immediately so
  # the change-author sees the drift signal in their PR checks.
  pull_request:
    paths:
      - 'internal/githubmcp/**'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/upstream-drift.yml'

permissions:
  contents: read

jobs:
  drift:
    name: tools/list smoke against latest github-mcp-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install latest github-mcp-server
        # Explicitly not version-pinned — the whole point of this job is
        # to detect drift in the latest release. The Dockerfile and
        # quickstart-systemd.sh stay on their pinned version.
        run: |
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL -o /tmp/ghmcp.tar.gz \
            "https://github.com/github/github-mcp-server/releases/latest/download/github-mcp-server_Linux_${ARCH}.tar.gz"
          sudo tar -xzf /tmp/ghmcp.tar.gz -C /usr/local/bin github-mcp-server
          sudo chmod +x /usr/local/bin/github-mcp-server
          /usr/local/bin/github-mcp-server --version || true

      - name: tools/list drift smoke
        # No real GitHub API hit — the upstream's tools/list returns its
        # static catalogue without ever calling the API. A placeholder
        # token is enough.
        env:
          NOMADDEV_GITHUB_TOKEN: ghp_drift_smoke_placeholder
        run: |
          go test -tags github -race -count=1 -run TestUpstreamDrift \
            -v ./internal/githubmcp/...
