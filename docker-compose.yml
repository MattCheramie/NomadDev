services:
  orchestrator:
    # Default to the prebuilt multi-arch image published by
    # .github/workflows/release.yml so `docker compose up` works on a fresh
    # VPS without ever running `docker build`. Override with
    # NOMADDEV_IMAGE=… or use `docker compose build` to use the local
    # Dockerfile instead.
    image: ${NOMADDEV_IMAGE:-ghcr.io/mattcheramie/nomaddev:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomaddev-orchestrator
    restart: unless-stopped
    # Publish on ${NOMADDEV_BIND_ADDR} so phones on the tailnet can reach
    # the orchestrator. Default 127.0.0.1 keeps a bare `docker compose up`
    # safe on any host. For a real Tailscale deploy, set
    # NOMADDEV_BIND_ADDR to the host's tailnet IPv4 (`tailscale ip -4`).
    ports:
      - "${NOMADDEV_BIND_ADDR:-127.0.0.1}:8080:8080"
    env_file:
      - .env
    volumes:
      # Persistent SQLite stores + sandbox workspace. Survives container
      # rebuilds; back up the whole directory for disaster recovery.
      - nomaddev-data:/var/lib/nomaddev
      # Optional: uncomment to let the orchestrator run with -tags docker
      # against the host Docker daemon. Off by default because mounting the
      # daemon socket gives the container root-equivalent on the host — only
      # enable when the orchestrator runs on a host you fully control.
      # - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      # distroless/static has no shell and no wget, so the orchestrator
      # binary doubles as its own healthcheck client via -healthcheck.
      # /readyz returns 503 if any configured SQLite store is unreachable;
      # Compose flips the container to "unhealthy" and restart: unless-stopped
      # then bounces it.
      test: ["CMD", "/usr/local/bin/orchestrator", "-healthcheck", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  nomaddev-data:
