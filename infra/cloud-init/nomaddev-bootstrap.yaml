#cloud-config
# NomadDev cloud-init bootstrap.
#
# Drop into a fresh Ubuntu 24.04 VPS at provision time (Hetzner Cloud,
# Linode, Vultr, EC2 user-data) and the orchestrator is up + on the
# tailnet without a single SSH session.
#
# Pass the Tailscale auth key + JWT secret via the cloud provider's
# user-data templating. NEVER bake them into the file in a repo —
# both are credentials.
#
# Example Hetzner Cloud (terraform pseudocode):
#
#   resource "hcloud_server" "nomaddev" {
#     user_data = templatefile("./nomaddev-bootstrap.yaml", {
#       tailscale_auth_key = var.tailscale_auth_key
#       jwt_secret         = var.nomaddev_jwt_secret
#       gemini_api_key     = var.gemini_api_key
#     })
#   }

# 1. Disable cloud-provider default user, create the dedicated nomaddev
#    user matching the systemd unit's User=nomaddev.
users:
  - default
  - name: nomaddev
    system: true
    shell: /usr/sbin/nologin
    homedir: /var/lib/nomaddev

# 2. Lock down SSH: key-only, no root login, no password auth. The
#    infra/scripts/ssh-lockdown.sh script does the same thing
#    post-provision for hosts that boot without cloud-init.
ssh_pwauth: false
disable_root: true

# 3. Packages the quickstart depends on.
package_update: true
package_upgrade: true
packages:
  - curl
  - ca-certificates
  - sqlite3            # daily backup timer (Phase 8.10)
  - jq                 # quickstart smoke + operator convenience
  - ufw                # firewall; we block public :8080 outright

# 4. Write the env file the orchestrator + quickstart read.
write_files:
  - path: /etc/nomaddev/env
    owner: root:nomaddev
    permissions: '0640'
    defer: true
    content: |
      # Generated by cloud-init. Edit in place for ongoing changes;
      # cloud-init only runs on first boot.
      NOMADDEV_JWT_SECRET=${jwt_secret}

      # Mock translator works without an API key — set this to switch
      # to the real Gemini backend after first boot if you want.
      NOMADDEV_MIDDLEWARE_RUNTIME=mock
      NOMADDEV_GEMINI_API_KEY=${gemini_api_key}

      # Phase 8 defaults — see .env.example in the repo for the full
      # knob set + comments.
      NOMADDEV_LOG_LEVEL=info
      NOMADDEV_SESSION_BACKEND=sqlite
      NOMADDEV_HISTORY_BACKEND=sqlite
      NOMADDEV_AUTH_REVOCATION_BACKEND=sqlite
      NOMADDEV_AUDIT_BACKEND=file
      NOMADDEV_AUDIT_PATH=/var/lib/nomaddev/audit.log

# 5. Bootstrap script. Joins the tailnet, runs the quickstart
#    installer, opens the host's tailnet IPv4 in the firewall.
runcmd:
  - [bash, -lc, "curl -fsSL https://tailscale.com/install.sh | sh"]
  - [tailscale, up, "--authkey=${tailscale_auth_key}", "--ssh", "--advertise-tags=tag:nomaddev-server"]
  - [bash, -lc, "ufw default deny incoming && ufw default allow outgoing && ufw allow in on tailscale0 && ufw --force enable"]
  - [bash, -lc, "git clone --depth 1 https://github.com/MattCheramie/NomadDev /opt/nomaddev"]
  - [bash, -lc, "cd /opt/nomaddev && sudo bash infra/scripts/quickstart-systemd.sh"]
  - [bash, -lc, "tailscale ip -4 | head -1 | xargs -I{} echo 'NomadDev up on http://{}:8080' >> /var/log/nomaddev-bootstrap.log"]

# 6. Drop a banner so the next operator that SSHes (via tailscale ssh,
#    not port 22 — we just firewalled that) can see what's running.
write_files:
  - path: /etc/motd
    content: |

      ─── NomadDev orchestrator ───
      systemd unit: nomaddev-orchestrator.service
      backup timer: nomaddev-backup.timer
      logs:         journalctl -u nomaddev-orchestrator -f
      env:          /etc/nomaddev/env
      data:         /var/lib/nomaddev
      bootstrap:    /var/log/nomaddev-bootstrap.log

      Tailnet IP only; public :8080 is firewalled.
